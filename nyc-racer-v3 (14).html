// ═══════════════════════════════════════════════════

// ── VERSÃO DO JOGO ─────────────────────────────────
// ⚠️ Mude este número a cada nova versão do arquivo ⚠️
const GAME_VERSION = '1.7';

// URL do JSON remoto — hospede isso no GitHub Pages ou similar.
// O arquivo version.json deve conter: {"version":"1.8","download":"URL_DO_HTML"}
// Enquanto não tiver servidor próprio, apontamos para um fallback inofensivo.
const VERSION_URL = 'https://raw.githubusercontent.com/nycracer-game/updates/main/version.json';

let updateAvailable = false;
let updateDismissed = false;
let latestVersion = GAME_VERSION;
let downloadUrl = '';

// Faz a verificação remota ao carregar (silenciosa — não trava o jogo)
(function fetchVersion(){
  try {
    fetch(VERSION_URL, {cache:'no-store'})
      .then(r=>r.ok?r.json():null)
      .then(data=>{
        if(!data||!data.version)return;
        latestVersion = data.version;
        downloadUrl = data.download||'';
        // Compara versões numericamente (ex: "1.8" > "1.7")
        const toNum = v => parseFloat(v.replace(/[^0-9.]/g,''))||0;
        if(toNum(latestVersion) > toNum(GAME_VERSION)){
          updateAvailable = true;
        }
      })
      .catch(()=>{}); // sem internet = silencioso
  } catch(e){}
})();

const cvs=document.getElementById('c'),ctx=cvs.getContext('2d');
const W=cvs.width=1280,H=cvs.height=720;
// Detecta mobile apenas pelo userAgent — evita falso-positivo em PCs com touchscreen
const IS_MOB=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||
  (/Mobi|Mobile/i.test(navigator.userAgent)&&navigator.maxTouchPoints>0);
const tui=document.getElementById('tui');
function resize(){
  const s=Math.min(innerWidth/W,innerHeight/H);
  cvs.style.width=(W*s)+'px';cvs.style.height=(H*s)+'px';
  tui.style.display=IS_MOB?'block':'none';
}
addEventListener('resize',resize);resize();

// ── BADGE DE ATUALIZAÇÃO ───────────────────────────
function drawUpdateBadge(){
  if(!updateAvailable||updateDismissed)return;
  const bw=440,bh=70,bx=W/2-bw/2,by=6;
  // Fundo pulsante
  const pulse=0.75+Math.sin(frame*0.07)*0.25;
  ctx.globalAlpha=pulse;
  ctx.fillStyle='#001830';rr(bx,by,bw,bh,12);ctx.fill();ctx.globalAlpha=1;
  ctx.save();ctx.shadowBlur=18;ctx.shadowColor='#00CCFF';
  ctx.strokeStyle='#00CCFF';ctx.lineWidth=2;rr(bx,by,bw,bh,12);ctx.stroke();ctx.restore();
  // Ícone + texto
  ctx.fillStyle='#00EEFF';ctx.font='bold 13px Orbitron';ctx.textAlign='left';
  ctx.fillText('🔄  NOVA VERSÃO v'+latestVersion+' DISPONÍVEL!',bx+14,by+24);
  ctx.fillStyle='#5599BB';ctx.font='10px Orbitron';
  ctx.fillText('Você tem a v'+GAME_VERSION+' — baixe o arquivo HTML atualizado',bx+14,by+42);
  // Botão BAIXAR (só aparece se tiver URL)
  if(downloadUrl){
    const dbx=bx+bw-154,dby=by+10,dbH=hov(dbx,dby,140,50);
    ctx.fillStyle=dbH?'#004488':'#002244';rr(dbx,dby,140,50,8);ctx.fill();
    ctx.strokeStyle='#00AAFF';ctx.lineWidth=dbH?2:1;rr(dbx,dby,140,50,8);ctx.stroke();
    ctx.fillStyle='#FFF';ctx.font='bold 11px Orbitron';ctx.textAlign='center';
    ctx.fillText('⬇  BAIXAR AGORA',dbx+70,dby+30);
    if(mclk&&dbH) window.open(downloadUrl,'_blank');
  }
  // Botão X
  const xbx=bx+bw-24,xby=by+6,xbH=hov(xbx,xby,18,18);
  ctx.fillStyle=xbH?'#882222':'#331111';rr(xbx,xby,18,18,4);ctx.fill();
  ctx.strokeStyle='#AA3333';ctx.lineWidth=1;rr(xbx,xby,18,18,4);ctx.stroke();
  ctx.fillStyle='#FF6666';ctx.font='bold 12px Orbitron';ctx.textAlign='center';
  ctx.fillText('✕',xbx+9,xby+13);
  if(mclk&&xbH) updateDismissed=true;
}



// ── SAVE KEY universal ─────────────────────────────
const SAVE_KEY='nycracer_UNIVERSAL_v1';
let ACCOUNTS={},CUR_USER=null,SAVE=null;
function aLoad(){try{return JSON.parse(localStorage.getItem(SAVE_KEY)||'{}');}catch(e){return{};}}
function aSave(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(ACCOUNTS));}catch(e){}}
function saveGame(){
  if(!CUR_USER||!SAVE)return;
  SAVE.gv=3;ACCOUNTS[CUR_USER]=Object.assign({},ACCOUNTS[CUR_USER],SAVE);aSave();
}
function loadUser(u){
  ACCOUNTS=aLoad();if(!ACCOUNTS[u])return false;
  CUR_USER=u;SAVE=JSON.parse(JSON.stringify(ACCOUNTS[u]));
  if(!Array.isArray(SAVE.owned))SAVE.owned=[0];
  if(typeof SAVE.coins!=='number')SAVE.coins=300;
  if(!SAVE.best)SAVE.best={};
  if(!SAVE.races)SAVE.races=0;
  if(!SAVE.owned.includes(0))SAVE.owned.unshift(0);
  // Remove carro ADM se o usuário não tem acesso ADM
  if(!SAVE.admUnlock){
    const admIdx=CARS.findIndex(c=>c.adm);
    if(admIdx>=0)SAVE.owned=SAVE.owned.filter(i=>i!==admIdx);
  }
  // Remove carro F1 se o usuário não chegou no rank máximo
  if(!SAVE.f1Unlock){
    const f1Idx=CARS.findIndex(c=>c.f1);
    if(f1Idx>=0)SAVE.owned=SAVE.owned.filter(i=>i!==f1Idx);
  }
  return true;
}
function createUser(u,p){
  ACCOUNTS=aLoad();if(ACCOUNTS[u])return false;
  ACCOUNTS[u]={pass:p,coins:300,owned:[0],best:{},races:0,gv:3};
  aSave();return true;
}

// ── EXPORTAR / IMPORTAR CONTA ──────────────────────
// Permite usar a mesma conta em outro dispositivo
function exportAccount(){
  if(!CUR_USER||!SAVE)return null;
  saveGame();
  const data={u:CUR_USER,d:ACCOUNTS[CUR_USER]};
  // Codifica em base64 para fácil cópia
  return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
}
function importAccount(code){
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(!data.u||!data.d||!data.d.pass)return'✗ Código inválido';
    ACCOUNTS=aLoad();
    // Se usuário já existe neste dispositivo, mescla dados (preserva mais moedas)
    if(ACCOUNTS[data.u]){
      const existing=ACCOUNTS[data.u];
      const merged=Object.assign({},data.d);
      merged.coins=Math.max(existing.coins||0,data.d.coins||0);
      // Une carros possuídos
      const allOwned=[...new Set([...(existing.owned||[]),...(data.d.owned||[])])];
      merged.owned=allOwned;
      // Usa o rank mais alto
      if(existing.ranked&&data.d.ranked){
        merged.ranked=existing.ranked.ri>=(data.d.ranked.ri||0)?existing.ranked:data.d.ranked;
      }
      ACCOUNTS[data.u]=merged;
    } else {
      ACCOUNTS[data.u]=data.d;
    }
    aSave();
    return'✓ Conta importada: '+data.u;
  }catch(e){return'✗ Código inválido';}
}

// Estado da tela de exportar/importar
let expImpState='';let expImpMsg='';let expImpT=0;
let impCode='';let impActive=false;
// Input HTML para importar
(function(){
  const el=document.createElement('input');
  el.id='imp_inp';el.type='text';el.maxLength=2000;el.placeholder='Cole o código aqui...';

  document.body.appendChild(el);
  el.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();
      const r=importAccount(el.value);expImpMsg=r;expImpT=220;
      if(r.startsWith('✓')){el.value='';el.style.display='none';impActive=false;}
    }
    if(e.key==='Escape'){el.style.display='none';impActive=false;el.value='';}
  });
})();
function showImpInput(){
  const el=document.getElementById('imp_inp');if(!el)return;
  const s=Math.min(innerWidth/W,innerHeight/H),cr=cvs.getBoundingClientRect();
  el.style.left=(cr.left+(W/2-200)*s)+'px';
  el.style.top=(cr.top+(H/2+30)*s)+'px';
  el.style.width=(400*s)+'px';
  el.style.fontSize=Math.max(10,Math.round(13*s))+'px';
  el.style.display='block';el.focus();impActive=true;
}
function hideImpInput(){const el=document.getElementById('imp_inp');if(el){el.style.display='none';el.value='';}}
addEventListener('resize',()=>{if(impActive)showImpInput();});

// migrate old keys
['nycr3_accounts','nycracer2'].forEach(k=>{
  try{const d=localStorage.getItem(k);if(!d)return;
    const obj=JSON.parse(d);
    if(obj&&typeof obj==='object'){
      const keys=Object.keys(obj);
      if(keys.length&&obj[keys[0]]&&obj[keys[0]].pass!==undefined){
        ACCOUNTS=aLoad();
        if(!Object.keys(ACCOUNTS).length){localStorage.setItem(SAVE_KEY,d);}
      }
    }
  }catch(e){}
});

// ── INPUT ──────────────────────────────────────────
const K={},TK={a:false,b:false,l:false,r:false};
let mx=W/2,my=H/2,mclk=false,_mclkConsumed=false;
// mclk é true apenas no FRAME em que o clique acontece, não em frames seguintes
let _pendingClick=false;
addEventListener('keydown',e=>{K[e.code]=true;K[e.key]=true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
});
addEventListener('keyup',e=>{K[e.code]=false;K[e.key]=false;});
cvs.addEventListener('mousemove',e=>{const r=cvs.getBoundingClientRect();mx=(e.clientX-r.left)*(W/r.width);my=(e.clientY-r.top)*(H/r.height);});
// Mouse click — apenas no mousedown, NÃO no hover
cvs.addEventListener('mousedown',e=>{
  const r=cvs.getBoundingClientRect();mx=(e.clientX-r.left)*(W/r.width);my=(e.clientY-r.top)*(H/r.height);_pendingClick=true;
});
// Touch — registra posição e clique, mas com proteção de delay
let _lastTouchTime=0;
cvs.addEventListener('touchstart',e=>{
  e.preventDefault();
  const now=Date.now();
  // Ignora toques muito rápidos consecutivos (< 120ms) para evitar phantom clicks
  if(now-_lastTouchTime<120)return;
  _lastTouchTime=now;
  const t=e.touches[0],r=cvs.getBoundingClientRect();
  mx=(t.clientX-r.left)*(W/r.width);my=(t.clientY-r.top)*(H/r.height);_pendingClick=true;
},{passive:false});

function tbtn(id,key){
  const el=document.getElementById(id);if(!el)return;
  const on=e=>{e.preventDefault();e.stopPropagation();TK[key]=true;el.classList.add('tap');};
  const off=e=>{e.preventDefault();TK[key]=false;el.classList.remove('tap');};
  el.addEventListener('touchstart',on,{passive:false});el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);el.addEventListener('mouseup',off);el.addEventListener('mouseleave',off);
}
tbtn('ta','a');tbtn('tb','b');tbtn('tl','l');tbtn('tr','r');

// ── ADM INPUT ──────────────────────────────────────
let admMsg='',admT=0;
(function(){
  const el=document.createElement('input');
  el.id='adm';el.type='password';el.maxLength=24;el.placeholder='Código ADM...';el.autocomplete='off';
  el.style.cssText='position:fixed;display:none;z-index:200;background:rgba(2,14,4,.97);border:2px solid #1a5a22;border-radius:6px;color:#33FF66;font-family:"Share Tech Mono",monospace;font-size:16px;padding:8px 14px;outline:none;width:260px;caret-color:#33FF66;letter-spacing:2px;';
  document.body.appendChild(el);
  el.addEventListener('keydown',e=>{
    e.stopPropagation();
    if(e.key==='Enter'){e.preventDefault();admSubmit(el.value.trim());el.value='';}
    if(e.key==='Escape'){e.preventDefault();el.style.display='none';el.value='';STATE='MENU';}
  });
})();
function admShow(){
  const el=document.getElementById('adm');if(!el)return;
  const s=Math.min(innerWidth/W,innerHeight/H),cr=cvs.getBoundingClientRect();
  el.style.left=(cr.left+(14+10)*s)+'px';el.style.top=(cr.top+(H-185+42)*s)+'px';
  el.style.width=(260*s)+'px';el.style.fontSize=Math.max(11,Math.round(15*s))+'px';
  el.style.display='block';el.focus();
}
function admHide(){const el=document.getElementById('adm');if(el){el.style.display='none';el.value='';}}
function admSubmit(code){
  if(!SAVE){admMsg='✗ Faça login primeiro';admT=200;return;}
  if(code==='admboost'){
    // Dá todos os carros normais (sem ADM e sem F1)
    const normalCars=CARS.map((_,i)=>i).filter(i=>!CARS[i].adm&&!CARS[i].f1);
    SAVE.coins=100000;
    SAVE.owned=[...new Set([...SAVE.owned,...normalCars])];
    // Libera carro ADM
    SAVE.admUnlock=true;
    const admIdx=CARS.findIndex(c=>c.adm);
    if(admIdx>=0&&!SAVE.owned.includes(admIdx))SAVE.owned.push(admIdx);
    // Libera carro F1 Champion
    const f1Idx=CARS.findIndex(c=>c.f1);
    if(f1Idx>=0&&!SAVE.owned.includes(f1Idx))SAVE.owned.push(f1Idx);
    // Rank máximo (Formula 1 = índice 12)
    if(!SAVE.ranked)SAVE.ranked={ri:0,pts:0,hist:[]};
    SAVE.ranked.ri=RANKS.length-1;SAVE.ranked.pts=0;
    SAVE.f1Unlock=true;
    saveGame();
    admMsg='✓ RANK MÁX + TODOS OS CARROS + F1 CHAMPION!';admT=300;addCoinFX(W/2,H/2);
  } else if(code==='admgif'){
    if(!SAVE.valeCarro)SAVE.valeCarro=0;SAVE.valeCarro++;saveGame();
    admMsg='✓ VALE-CARRO ADICIONADO! Total: '+SAVE.valeCarro;admT=300;addCoinFX(W/2,H/2);
  } else if(code.length>0){admMsg='✗ CÓDIGO INVÁLIDO';admT=180;}
}

// ── TRACK BUILDER ──────────────────────────────────
function buildTrack(def){
  const cp=def.cp,ncp=cp.length;
  function cr(p0,p1,p2,p3,t){const t2=t*t,t3=t2*t;return[
    .5*(2*p1[0]+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3),
    .5*(2*p1[1]+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3)];}
  const tp=[];
  for(let i=0;i<ncp;i++){const p0=cp[(i-1+ncp)%ncp],p1=cp[i],p2=cp[(i+1)%ncp],p3=cp[(i+2)%ncp];
    for(let t=0;t<14;t++)tp.push(cr(p0,p1,p2,p3,t/14));}
  const nt=tp.length,tw=158;
  function tan(i){const a=tp[(i+1)%nt],b=tp[(i-1+nt)%nt],dx=a[0]-b[0],dy=a[1]-b[1],l=Math.hypot(dx,dy)||1;return[dx/l,dy/l];}
  function norm(i){const[tx,ty]=tan(i);return[-ty,tx];}
  function closest(x,y,h=0,r=75){let b=Infinity,idx=h;
    for(let d=-r;d<=r;d++){const i=(h+d+nt)%nt,dx=tp[i][0]-x,dy=tp[i][1]-y,dd=dx*dx+dy*dy;if(dd<b){b=dd;idx=i;}}return idx;}
  function sr(s){const x=Math.sin(s*127.1+311.7)*43758.5;return x-Math.floor(x);}
  const BC=['#0d1520','#111830','#0a1228','#14152a','#101828','#0c1a22'];
  const WC=['#FFF088','#FFAA44','#88CCFF','#FF9960'];
  const bldgs=[];
  for(let i=0;i<nt;i+=9){const[nx,ny]=norm(i),pt=tp[i];
    for(let s=-1;s<=1;s+=2){const d2=tw/2+22+sr(i*13.7+s*7)*55;
      bldgs.push({x:pt[0]+nx*d2*s,y:pt[1]+ny*d2*s,w:55+sr(i*5.1+s)*105,h:48+sr(i*7.3+s*2)*95,fl:2+Math.floor(sr(i*11.9+s)*7),ci:Math.floor(sr(i*17+s)*6),seed:i*10+s});}}
  return{tp,nt,tw,tan,norm,closest,bldgs,BC,WC};
}

// ── PARTICLES ──────────────────────────────────────
class Pt{constructor(x,y,vx,vy,life,col,sz){Object.assign(this,{x,y,vx,vy,life,max:life,col,sz:sz||3});}}
let PTS=[];
function smk(x,y,a){for(let i=0;i<2;i++)PTS.push(new Pt(x-Math.cos(a)*18+(Math.random()-.5)*8,y-Math.sin(a)*18+(Math.random()-.5)*8,(Math.random()-.5)*.7,(Math.random()-.5)*.7,28,'#aaa',3+Math.random()*2));}
function spk(x,y){for(let i=0;i<5;i++){const a=Math.random()*Math.PI*2,v=1+Math.random()*3;PTS.push(new Pt(x,y,Math.cos(a)*v,Math.sin(a)*v,15,'#FF8800',2));}}
function addCoinFX(x,y){for(let i=0;i<6;i++){const a=Math.random()*Math.PI*2,v=.8+Math.random()*2;PTS.push(new Pt(x,y,Math.cos(a)*v,Math.sin(a)*v-1.5,40,'#FFCC00',4));}}
function updPts(){PTS=PTS.filter(p=>p.life-->0);PTS.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.035;});}
function drwPts(cx,cy){PTS.forEach(p=>{const a=p.life/p.max;ctx.globalAlpha=a*.6;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x-cx,p.y-cy,p.sz*(a*.5+.5),0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

// ── CAR CLASS ──────────────────────────────────────
class Car{
  constructor(di,tr,tOff,lat){
    this.d=CARS[di];this.di=di;this.tr=tr;
    this.sp=0;this.ang=0;this.lap=0;this.fin=false;
    this.ti=0;this.lti=0;this.off=false;this.offt=0;this.ft=0;
    const si=((tOff%tr.nt)+tr.nt)%tr.nt;
    const[tx,ty]=tr.tan(si),[nx,ny]=tr.norm(si);
    this.x=tr.tp[si][0]+nx*lat;this.y=tr.tp[si][1]+ny*lat;
    this.ang=Math.atan2(ty,tx);this.ti=si;this.lti=si;
  }
  move(acc,brk,L,R){
    if(this.fin){this.sp*=.97;this._mv();return;}
    const d=this.d;
    if(acc)this.sp+=d.ac*(1-Math.abs(this.sp)/d.ts);
    if(brk){if(this.sp>.4)this.sp-=d.bk;else if(this.sp>-2.5)this.sp-=.1;}
    if(!acc)this.sp*=this.off?.90:.977;
    this.sp=Math.max(this.sp,-2.5);
    if(Math.abs(this.sp)>.15){const sf=d.tn*(Math.abs(this.sp)/d.ts)*Math.sign(this.sp);if(L)this.ang-=sf;if(R)this.ang+=sf;}
    this._mv();this._wall();this._lap();
    if(brk&&this.sp>3.5)smk(this.x,this.y,this.ang);
  }
  _mv(){this.x+=Math.cos(this.ang)*this.sp;this.y+=Math.sin(this.ang)*this.sp;}
  _wall(){
    this.ti=this.tr.closest(this.x,this.y,this.ti);
    const[nx,ny]=this.tr.norm(this.ti),dx=this.x-this.tr.tp[this.ti][0],dy=this.y-this.tr.tp[this.ti][1];
    const lat=dx*nx+dy*ny,hw=this.tr.tw/2*.87;
    if(Math.abs(lat)>hw){
      // Parede DURA — empurra 100% de volta, sem escapar
      const ex=lat-Math.sign(lat)*hw;
      this.x-=nx*ex;this.y-=ny*ex; // correção total
      // Cancela componente de velocidade perpendicular à pista
      const vn=Math.cos(this.ang)*nx+Math.sin(this.ang)*ny; // componente normal
      this.x-=Math.cos(this.ang)*vn*.8;this.y-=Math.sin(this.ang)*vn*.8;
      this.sp*=.78;
      spk(this.x,this.y);this.off=true;this.offt=60;
    }
    if(this.offt>0){this.offt--;if(!this.offt)this.off=false;}
  }
  _lap(){const{nt}=this.tr,li=this.lti,ci=this.ti;if(li>nt*.9&&ci<nt*.1){this.lap++;if(this.lap>=numLaps){this.fin=true;this.ft=raceT;}}this.lti=ci;}
  prog(){return this.lap*this.tr.nt+this.ti;}
  draw(cx,cy){
    const CL=42,CW=20,d=this.d;
    ctx.save();ctx.translate(this.x-cx,this.y-cy);ctx.rotate(this.ang);
    ctx.globalAlpha=.2;ctx.fillStyle='#000';ctx.fillRect(-CL/2+4,-CW+4,CL,CW*2);ctx.globalAlpha=1;
    ctx.fillStyle=d.body;ctx.fillRect(-CL/2,-CW,CL,CW*2);
    ctx.fillStyle=d.roof;ctx.fillRect(-CL/2+8,-CW+5,CL-16,CW*2-10);
    ctx.fillStyle='#1a3a60';ctx.globalAlpha=.85;ctx.fillRect(-CL/2+9,-CW+5,11,CW*2-10);ctx.fillRect(CL/2-18,-CW+5,11,CW*2-10);ctx.globalAlpha=1;
    ctx.fillStyle='#FFFFAA';ctx.fillRect(CL/2-5,-CW+2,5,5);ctx.fillRect(CL/2-5,CW-7,5,5);
    ctx.fillStyle=this.sp<.5?'#550000':'#FF1100';ctx.fillRect(-CL/2,-CW+2,5,5);ctx.fillRect(-CL/2,CW-7,5,5);
    ctx.fillStyle='rgba(0,0,0,.4)';ctx.fillRect(-CL/2+5,-CW-2,10,4);ctx.fillRect(CL/2-13,-CW-2,10,4);ctx.fillRect(-CL/2+5,CW-2,10,4);ctx.fillRect(CL/2-13,CW-2,10,4);
    ctx.restore();
  }
}

// ── CAR-TO-CAR COLLISION ───────────────────────────
// Empurra carros que colidem ligeiramente para o lado
function resolveCarCollisions(){
  const cars=allCars;
  const CLEN=42,CWID=22,PUSH=6; // distância para colidir, força do empurrão
  for(let i=0;i<cars.length;i++){
    for(let j=i+1;j<cars.length;j++){
      const a=cars[i],b=cars[j];
      const dx=b.x-a.x,dy=b.y-a.y;
      const dist=Math.hypot(dx,dy);
      if(dist>CLEN)continue; // longe demais, ignora
      if(dist<0.1)continue;  // mesmo lugar, ignora
      const overlap=CLEN-dist;
      // Direção do empurrão
      const nx=dx/dist,ny=dy/dist;
      // Empurra cada carro para lados opostos (metade cada)
      const force=overlap*0.5*PUSH/CLEN;
      a.x-=nx*force;a.y-=ny*force;
      b.x+=nx*force;b.y+=ny*force;
      // Reduz velocidade levemente (impacto)
      a.sp*=0.94;b.sp*=0.94;
      // Pequena faísca visual
      spk((a.x+b.x)/2,(a.y+b.y)/2);
    }
  }
}


class AICar extends Car{
  constructor(di,tr,tOff,lat,forceSM){
    super(di,tr,tOff,lat);
    this.sm=forceSM!=null?Math.min(.99,Math.max(.30,forceSM)):DCFG.speedPct+(Math.random()-.5)*0.04;
    this.errOn=false;this.errT=0;this.errA=0;
    this.recT=0;this.wasOff=false;
  }
  _curvAt(steps){
    const{tp,nt}=this.tr;
    const a=tp[this.ti],b=tp[(this.ti+steps)%nt],c=tp[(this.ti+steps*2)%nt];
    const ax=b[0]-a[0],ay=b[1]-a[1],bx=c[0]-b[0],by=c[1]-b[1];
    return Math.abs(Math.atan2(Math.abs(ax*by-ay*bx),ax*bx+ay*by+.001));
  }
  aiMove(){
    if(this.fin){this.sp*=.97;this._mv();return;}
    const{tp,nt,norm}=this.tr,dc=DCFG;

    // 1. STEERING — aponta para ponto à frente
    const aimI=(this.ti+dc.lookAhead)%nt;
    let ad=Math.atan2(tp[aimI][1]-this.y,tp[aimI][0]-this.x)-this.ang;
    while(ad>Math.PI)ad-=Math.PI*2;while(ad<-Math.PI)ad+=Math.PI*2;

    // 2. ERRO — frequência e magnitude controlados por dificuldade
    if(!this.errOn&&Math.random()<dc.errChance){
      this.errOn=true;
      this.errT=dc.errDur[0]+Math.random()*(dc.errDur[1]-dc.errDur[0]);
      this.errA=(Math.random()<.5?1:-1)*dc.errMag;
    }
    if(this.errOn){ad+=this.errA;this.errT--;if(this.errT<=0){this.errOn=false;this.errA=0;}}

    // 3. RECUPERAÇÃO PÓS-BATIDA
    if(this.off&&!this.wasOff){this.wasOff=true;this.recT=dc.recTime;this.errOn=false;this.errA=0;}
    if(!this.off)this.wasOff=false;
    if(this.recT>0){
      const[nx,ny]=norm(this.ti);
      const lat=(this.x-tp[this.ti][0])*nx+(this.y-tp[this.ti][1])*ny;
      ad-=(lat/(this.tr.tw/2))*dc.recStr;
      this.recT--;
    }

    // 4. FRENAGEM — baseada em curvatura à frente
    const brkSteps=Math.round(6+this.sm*16);
    const cv=this._curvAt(brkSteps);
    const safeSpd=this.d.ts*this.sm*(1-cv*dc.brakeSens);
    const needBrk=this.sp>safeSpd+.3||(Math.abs(ad)>.50&&this.sp>2.8);

    // 5. RUBBER-BAND leve
    if(player){
      const g=(this.prog()-player.prog())/nt;
      if(g>DCFG.rbFwd)this.sm=Math.max(DCFG.speedPct*.82,this.sm-.0005);
      if(g<-DCFG.rbBck)this.sm=Math.min(DCFG.speedPct*1.04,this.sm+.0003);
    }

    this.move(!needBrk&&this.sp<this.d.ts*this.sm,needBrk,ad<-.018,ad>.018);
  }
}

function pickPool(tier,exclude,count){
  const pool=CARS.map((c,i)=>({i,t:c.tier})).filter(c=>c.t===tier&&c.i!==exclude).map(c=>c.i);
  const fallback=CARS.map((_,i)=>i).filter(i=>i!==exclude&&!pool.includes(i));
  const full=[...pool,...fallback];
  return full.sort(()=>Math.random()-.5).slice(0,count);
}

function drawRankFin(){
  drawWorld();updPts();drwPts(camX,camY);sl();
  ctx.fillStyle='rgba(0,0,0,.88)';ctx.fillRect(0,0,W,H);
  const rs=rSave(),rk=RANKS[rankRun];
  const pos=allCars.filter(c=>c.prog()>player.prog()).length+1;
  const won=pos===1;
  if(pendRew===0){
    pendRew=1;
    // XP por posição:
    // 1° = +pw (vitória)
    // 2° = pw*(-0.3) pequena perda
    // 3° = pw*(-0.5) perda moderada  
    // 4°+ = pl (perda máxima)
    const won=pos===1;
    let dp;
    if(pos===1)        dp=rk.pw;
    else if(pos===2)   dp=Math.ceil(rk.pl*0.3);   // perda suave (-3 a -6)
    else if(pos===3)   dp=Math.ceil(rk.pl*0.6);   // perda média (-5 a -12)
    else               dp=rk.pl;                   // perda máxima

    const newPts=rs.pts+dp;

    // Rank UP: venceu e atingiu o cap
    if(won&&newPts>=rk.cap&&rs.ri<RANKS.length-1){
      rs.ri++;rs.pts=Math.min(30,newPts-rk.cap);
      // Chegou no rank máximo (Formula 1) — ganha o carro especial!
      if(rs.ri===RANKS.length-1){
        const f1Idx=CARS.findIndex(c=>c.f1);
        if(f1Idx>=0&&!SAVE.owned.includes(f1Idx)){
          SAVE.owned.push(f1Idx);SAVE.f1Unlock=true;
          setNotif('🏆 F1 CHAMPION DESBLOQUEADO!');
        }
      }
    }
    // Rank DOWN: perdeu pts suficientes para ser rebaixado
    // Só rebaixa se os pts atuais já estavam baixos (< 40% do cap)
    // Isso evita rebaixamento imediato logo após subir de rank
    else if(!won&&newPts<=0&&rs.ri>0){
      rs.ri=Math.max(0,rs.ri-1);
      // Volta com pts proporcional: menos pts antes = volta com mais pts no rank abaixo
      const pctBefore=rs.pts/rk.cap; // quanto % tinha antes de perder
      rs.pts=Math.round(RANKS[rs.ri].cap*(0.55+pctBefore*0.20));
    }
    else{rs.pts=Math.max(0,newPts);}

    rs.hist=rs.hist||[];rs.hist.push({won,dp,pos,ri:rankRun});if(rs.hist.length>20)rs.hist=rs.hist.slice(-20);
    SAVE.ranked=rs;SAVE.coins+=won?Math.max(20,80+rk.pw*2):Math.max(5,10+pos);saveGame();
  }
  const newRk=RANKS[rs.ri],px=W/2-298,py=36,pw=596,ph=H-72;
  // Calcula dp para exibição (mesmo cálculo do bloco acima, sem modificar estado)
  let dpDisplay;
  if(pos===1)       dpDisplay=rk.pw;
  else if(pos===2)  dpDisplay=Math.ceil(rk.pl*0.3);
  else if(pos===3)  dpDisplay=Math.ceil(rk.pl*0.6);
  else              dpDisplay=rk.pl;

  ctx.fillStyle='#000c1a';rr(px,py,pw,ph,14);ctx.fill();
  ctx.strokeStyle=won?'#FFCC00':pos===2?'#888888':'#FF3300';ctx.lineWidth=3;rr(px,py,pw,ph,14);ctx.stroke();
  ctx.save();
  const titleCol=won?'#FFCC00':pos===2?'#AAAAAA':'#FF4444';
  const titleTxt=won?'🏆 VITÓRIA RANQUEADA!':pos===2?'🥈 2° LUGAR':pos===3?'🥉 3° LUGAR':'💀 ÚLTIMO LUGAR';
  ctx.shadowBlur=18;ctx.shadowColor=titleCol;ctx.fillStyle=titleCol;ctx.font='bold 28px Orbitron';ctx.textAlign='center';
  ctx.fillText(titleTxt,W/2,py+42);ctx.restore();

  // XP ganho/perdido
  const xpCol=dpDisplay>0?'#00FF88':'#FF4444';
  ctx.fillStyle=xpCol;ctx.font='bold 20px Orbitron';ctx.textAlign='center';
  ctx.fillText((dpDisplay>0?'+':'')+dpDisplay+' XP',W/2,py+70);

  if(rs.ri>rankRun){
    ctx.save();ctx.shadowBlur=24;ctx.shadowColor=newRk.g;ctx.fillStyle=newRk.col;ctx.font='bold 18px Orbitron';ctx.textAlign='center';
    ctx.fillText('⬆  SUBIU DE RANK!',W/2,py+94);
    ctx.font='bold 14px Orbitron';ctx.fillText(rk.ico+' '+rk.name+'  →  '+newRk.ico+' '+newRk.name,W/2,py+116);ctx.restore();
    if(rs.ri===RANKS.length-1){
      ctx.save();ctx.shadowBlur=40;ctx.shadowColor='#FF2200';
      ctx.fillStyle='#FF2200';ctx.font='900 20px Orbitron';ctx.textAlign='center';
      ctx.fillText('🏆  RANK MÁXIMO ATINGIDO!',W/2,py+138);
      ctx.fillStyle='#FFCC00';ctx.font='bold 13px Orbitron';
      ctx.fillText('🚗  F1 CHAMPION GP RACER desbloqueado!',W/2,py+158);
      ctx.restore();
    }
  } else if(rs.ri<rankRun){
    ctx.fillStyle='#FF5533';ctx.font='bold 16px Orbitron';ctx.textAlign='center';
    ctx.fillText('⬇  REBAIXADO: '+rk.name+' → '+newRk.name,W/2,py+94);
    ctx.fillStyle='#884422';ctx.font='11px Orbitron';
    ctx.fillText('Você volta ao '+newRk.name+' com '+rs.pts+' / '+newRk.cap+' pts',W/2,py+114);
  } else {
    ctx.fillStyle=rk.col;ctx.font='bold 16px Orbitron';ctx.textAlign='center';
    ctx.fillText(rk.ico+' '+rk.name+' — '+rs.pts+' / '+rk.cap+' pts',W/2,py+92);
  }
  // PTS bar — mostra pts no rank ATUAL (após mudança)
  const bx2=px+28,by2=py+166,bw2=pw-56;const pct=Math.min(1,rs.pts/(newRk.cap||150));
  ctx.fillStyle='#0d1828';rr(bx2,by2,bw2,14,7);ctx.fill();
  const pg2=ctx.createLinearGradient(bx2,0,bx2+bw2,0);pg2.addColorStop(0,newRk.g);pg2.addColorStop(1,newRk.col);
  ctx.fillStyle=pg2;if(pct>0){ctx.beginPath();ctx.roundRect(bx2,by2,bw2*pct,14,7);ctx.fill();}
  ctx.fillStyle=newRk.col;ctx.font='bold 10px Orbitron';ctx.textAlign='center';ctx.fillText(rs.pts+'/'+(newRk.cap||150)+' XP',W/2,by2+26);
  // pos + time
  const ptxt=['🏆 1°','🥈 2°','🥉 3°','4°'],pcol=['#FFCC00','#BBBBBB','#CC8844','#AAAAAA'];
  ctx.fillStyle=pcol[Math.min(pos-1,3)];ctx.font='bold 20px Orbitron';ctx.textAlign='center';ctx.fillText(ptxt[Math.min(pos-1,3)]+' LUGAR — Tempo: '+fmt(finT),W/2,py+160);
  ctx.strokeStyle='#1a2a3a';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(px+20,py+178);ctx.lineTo(px+pw-20,py+178);ctx.stroke();
  [...allCars].sort((a,b)=>b.prog()-a.prog()).forEach((car,rank)=>{
    const isP=car===player,ry=py+194+rank*50;
    ctx.globalAlpha=isP?.12:.04;ctx.fillStyle=isP?'#FFCC00':'#FFF';rr(px+16,ry-11,pw-32,38,5);ctx.fill();ctx.globalAlpha=1;
    const rc=['#FFCC00','#CCC','#CC8844','#888'];
    ctx.fillStyle=rc[rank];ctx.font='bold 14px Orbitron';ctx.textAlign='left';ctx.fillText((rank+1)+'°',px+30,ry+10);
    ctx.fillStyle=car.d.body;ctx.fillText(car.d.short,px+66,ry+10);
    if(car.ft>0){ctx.fillStyle='#556677';ctx.font='10px Share Tech Mono';ctx.fillText(fmt(car.ft),px+230,ry+10);}
    if(isP){ctx.fillStyle='#FFFF00';ctx.textAlign='right';ctx.fillText('◄ VOCÊ',px+pw-20,ry+10);}
  });
  const b1y2=py+ph-60,bW2=180,bHh=44,b1x2=px+16,b2x2=b1x2+196,b3x2=b2x2+196;
  const hb1=hov(b1x2,b1y2,bW2,bHh),hb2=hov(b2x2,b1y2,bW2,bHh),hb3=hov(b3x2,b1y2,bW2,bHh);
  [[b1x2,rk.col,'🔄 JOGAR NOVAMENTE'],[b2x2,'#0055CC','🏠 MENU'],[b3x2,'#FFAA44','📊 RANK']].forEach(([bx,col,lbl],bi)=>{
    const hv2=[hb1,hb2,hb3][bi];ctx.fillStyle=hv2?col+'33':'#0d0d18';rr(bx,b1y2,bW2,bHh,7);ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=hv2?2:1.5;rr(bx,b1y2,bW2,bHh,7);ctx.stroke();ctx.fillStyle='#FFF';ctx.font='bold 10px Orbitron';ctx.textAlign='center';ctx.fillText(lbl,bx+bW2/2,b1y2+27);
  });
  if(mclk){if(hb1){pendRew=0;initRanked(rs.ri);STATE='COUNTDOWN';cdTimer=200;}else if(hb2){pendRew=0;STATE='MENU';}else if(hb3){pendRew=0;STATE='RANKED';}}
}

// ── MAIN LOOP ──────────────────────────────────────
function loop(){
  frame++;ctx.clearRect(0,0,W,H);
  // Clique dispara apenas 1 frame — pega o pending e limpa
  mclk=_pendingClick;_pendingClick=false;
  if(STATE!=='ADM')admHide();
  if(STATE!=='LOGIN'&&STATE!=='REG')hideF();
  if(STATE!=='EXPimp')hideImpInput();
  switch(STATE){
    case'LMENU':drawLMenu();break;
    case'LOGIN':drawLogin();break;
    case'REG':drawReg();break;
    case'MENU':drawMenu();break;
    case'GARAGE':drawGarage();break;
    case'MODEMAP':drawModeMap();break;
    case'CARSEL':drawCarSel();break;
    case'RANKS':drawRanks();break;
    case'EXPimp':drawExportImport();break;
    case'RANKED':drawRanked();break;
    case'VALEGIFT':drawValeGift();break;
    case'ADM':drawAdm();break;
    case'COUNTDOWN':drawCountdown();break;
    case'RACING':
      raceT+=1000/60;updPts();
      const A=K['ArrowUp']  ||K['KeyW']||K['w']||TK.a;
      const B=K['ArrowDown'] ||K['KeyS']||K['s']||K[' ']||TK.b;
      const L=K['ArrowLeft'] ||K['KeyA']||K['a']||TK.l;
      const R=K['ArrowRight']||K['KeyD']||K['d']||TK.r;
      player.move(A,B,L,R);ais.forEach(ai=>ai.aiMove());
      resolveCarCollisions();
      if(player.lap>0&&player._lln!==player.lap){player._lln=player.lap;if(player.lap<numLaps)setNotif('VOLTA '+player.lap+'/'+numLaps+' COMPLETA!');}
      camX+=(player.x-W/2-camX)*.085;camY+=(player.y-H/2-camY)*.085;
      drawWorld();drawHUD();sl();
      if(player.fin&&!didFin){didFin=true;finT=raceT;setNotif(allCars.filter(c=>c.prog()>player.prog()).length===0?'🏆 VITÓRIA!':'Corrida concluída!');
        setTimeout(()=>{STATE=gameMode==='ranked'?'RANKFIN':'FINISH';},2500);}
      break;
    case'FINISH':drawFinish();break;
    case'RANKFIN':drawRankFin();break;
  }
  requestAnimationFrame(loop);
}
loop();
</script>
